project:
  type: website
  render:
    - index.qmd
    - example.qmd

website:
  title: PlotCat
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: example.qmd
        text: Example
    tools:
      - icon: github
        href: https://github.com/VisruthSK/plotcat
        aria-label: PlotCat source code
        target: _blank
  repo-url: https://github.com/VisruthSK/plotcat
  repo-actions: [source, issue]
  repo-link-target: _blank

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    fig-format: svg

filters:
  - plotcat

execute:
  freeze: auto

